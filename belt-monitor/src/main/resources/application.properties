# 服务端口
server.port=8080

# 应用名称
spring.application.name=belt-monitor

# 日志级别
logging.level.com.wjiamao=INFO

# 异步请求超时设为 -1（不超时）
# 视频流是持续推送的长连接，必须关掉超时，否则几十秒后自动断开
spring.mvc.async.request-timeout=-1

# H2 文件数据库（数据保存在 belt-monitor/data/ 目录下）
spring.datasource.url=jdbc:h2:file:./data/beltmonitor
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

# HGL-150 皮带测速仪 Modbus RTU 配置
# 设为 false 时使用模拟数据（传感器未接入时使用）
modbus.enabled=true
modbus.port=COM3
modbus.baudrate=19200
modbus.slave-id=1
# 速度浮点数起始寄存器地址（与 Python 代码 read_float(1,...) 对应）
modbus.register=1